name: melodex
description: Melodex - Android Material Design 3 Music Player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Audio Playback
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  audio_session: ^0.1.18
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Preferences
  shared_preferences: ^2.2.2
  
  # File System
  path_provider: ^2.1.1
  file_picker: ^6.1.1
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Image Loading
  cached_network_image: ^3.3.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Utils
  uuid: ^4.2.1
  intl: ^0.19.0
  
  # UI
  flutter_slidable: ^3.0.1
  
  # Android specific
  android_content_provider: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
