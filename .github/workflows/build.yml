name: Build Melodex

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  GRADLE_VERSION: "8.11.1"
  JAVA_VERSION: "17"

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          gradle-home-cache-cleanup: true

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          ./gradlew projects --no-daemon 2>&1 | tail -20
        shell: bash

      - name: Assemble debug
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log
        shell: bash

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 3

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: melodex-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Get version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -E "versionName\s*=\s*" app/build.gradle.kts | awk -F'"' '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release and Upload APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}.${{ github.run_number }}
          name: Melodex v${{ steps.version.outputs.version }}.${{ github.run_number }}
          body: |
            Automated debug build from commit ${{ github.sha }}

            Commit message: ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/debug/*.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
